apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-deployment
  namespace: {{.Values.namespace}}
  labels:
    app: docmost
    env: {{.Values.global.environment}}

spec: 
  replicas: {{.Values.app.replicaCount}}
  selector:
    matchLabels:
      app: docmost

  template:
    metadata:
      labels:
        app: docmost

    spec:
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z -w 2 {{ .Release.Name }}-postgresql 5432; do
                echo "Waiting for PostgreSQL database to accept network connections..."
                sleep 2
              done
        - name: wait-for-redis
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z -w 2 {{ .Release.Name }}-redis-master 6379; do
                echo "Waiting for Redis cache to accept network connections..."
                sleep 2
              done

      containers:
        - name: docmost-app
          image: "{{.Values.app.repository}}:{{.Values.app.tag}}"
          imagePullPolicy: {{.Values.app.imagePullPolicy}}
          ports:  
            - containerPort: 3000
  
          env:
            - name: APP_URL
              value: {{.Values.app.config.appUrl | quote}}
            - name: PORT
              value: {{.Values.app.config.port | quote}}
            - name: APP_SECRET
              valueFrom:  
                secretKeyRef: 
                  name: {{.Values.app.config.secretName}}
                  key: APP_SECRET
            - name: POSTGRES_PASSWORD
              valueFrom:  
                secretKeyRef: 
                  name: {{.Values.app.config.secretName}}
                  key: POSTGRES_PASSWORD
            - name: DATABASE_URL
              value: {{ printf "postgresql://%s:$(POSTGRES_PASSWORD)@%s-postgresql:5432/%s" .Values.postgresql.auth.username .Release.Name .Values.postgresql.auth.database | quote }}

            - name: REDIS_URL
              value: {{ printf "redis://%s-redis-master:6379" .Release.Name | quote }}